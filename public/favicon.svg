<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(139, 92, 246, 0.6)); }
      50% { filter: drop-shadow(0 0 6px rgba(139, 92, 246, 0.9)) drop-shadow(0 0 12px rgba(59, 130, 246, 0.4)); }
    }
    @keyframes dash {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }
    .letters {
      animation: glow 3s ease-in-out infinite;
    }
    .border {
      stroke-dasharray: 200;
      animation: dash 2s ease-out forwards;
    }
  </style>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <!-- Animated border -->
  <rect class="border" x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="url(#g)" stroke-width="2" opacity="0.7"/>
  <!-- AJ letters -->
  <g class="letters">
    <!-- A -->
    <path d="M13 46 L24 18 L35 46 M17 38 L31 38" fill="none" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- J -->
    <path d="M39 18 L39 38 Q39 46 32 46" fill="none" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dot accent -->
    <circle cx="50" cy="18" r="2.5" fill="url(#g)" opacity="0.8"/>
  </g>
</svg>
